name: Release

# DF-453 — on a tag-push (v*): verify the tag matches package.json, run the test
# suite, pack the runner, and publish a GitHub release with the tarball attached.
# The runner is plain JS — no build step, and it is NOT published to npm (it is
# distributed as a GitHub release asset). This replaces the DF-216-deprecated
# /api/downloads/upload endpoint (which now returns 410 Gone).

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $pkg_version"
            exit 1
          fi

      - run: npm test

      - name: Pack the runner
        run: npm pack

      - name: Create GitHub release with the tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "devflow-runner-${version}.tgz" \
            --title "Runner $GITHUB_REF_NAME" \
            --generate-notes
